apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f docker/compose.run.cpu.yml convert -o k8s/ --deployment
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: gradio-app
  name: gradio-app
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gradio-app
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f docker/compose.run.cpu.yml convert -o k8s/ --deployment
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: gradio-app
    spec:
      containers:
        - env:
            - name: GRADIO_SERVER_NAME
              value: 0.0.0.0
            - name: GRADIO_SERVER_PORT
              value: "7860"
          image: ghcr.io/sergey21000/yolo-detector:main-cpu
          name: yolo-detector
          ports:
            - containerPort: 7860
              protocol: TCP
          volumeMounts:
            - mountPath: /app/models
              name: gradio-app-claim0
            - mountPath: /app/runs
              name: gradio-app-claim1
            - mountPath: /app/config.py
              name: gradio-app-cm2
              subPath: config.py
      restartPolicy: Always
      volumes:
        - name: gradio-app-claim0
          persistentVolumeClaim:
            claimName: gradio-app-claim0
        - name: gradio-app-claim1
          persistentVolumeClaim:
            claimName: gradio-app-claim1
        - configMap:
            items:
              - key: config.py
                path: config.py
            name: gradio-app-cm2
          name: gradio-app-cm2
